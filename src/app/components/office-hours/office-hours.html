<section id="buerozeiten" class="office-hours">
  <div class="office-hours__container">
    <h2 class="office-hours__heading">Bürozeiten</h2>

    <div class="office-hours__pdf-wrapper">
      <ngx-extended-pdf-viewer
        [src]="pdfUrl"
        [showToolbar]="false"
        [showSidebarButton]="false"
        [showFindButton]="false"
        [showPagingButtons]="false"
        [showZoomButtons]="false"
        [showPresentationModeButton]="false"
        [showOpenFileButton]="false"
        [showPrintButton]="false"
        [showDownloadButton]="false"
        [showSecondaryToolbarButton]="false"
        [showRotateButton]="false"
        [showHandToolButton]="false"
        [showSpreadButton]="false"
        [showPropertiesButton]="false"
        [textLayer]="true"
        zoom="page-width"
        height="700px"
        class="office-hours__pdf"
      ></ngx-extended-pdf-viewer>
    </div>

    <div class="office-hours__actions">
      <a
        [href]="pdfUrl"
        target="_blank"
        rel="noopener noreferrer"
        class="office-hours__btn"
      >
        PDF öffnen / herunterladen
      </a>
    </div>
  </div>
</section>
